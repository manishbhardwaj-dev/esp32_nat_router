name: Build ESP32 NAT Router

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1.4
          target: esp32
          path: router

      - name: Build firmware
        shell: bash
        run: |
          . $IDF_PATH/export.sh

          cd router

          idf.py set-target esp32
          idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32_nat_router_firmware
          path: |
            router/build/*.bin
            router/build/*.elf
            router/build/*.map